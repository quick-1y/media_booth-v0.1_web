version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: media-booth-postgres
    environment:
      POSTGRES_DB: booth
      POSTGRES_USER: booth
      POSTGRES_PASSWORD: booth
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booth -d booth"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: media-booth-app
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://booth:booth@postgres:5432/booth}
      APP_DATA_DIR: ${APP_DATA_DIR:-/data}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-info}
    volumes:
      - ./data:/data
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: media-booth-nginx
    depends_on:
      - app
    ports:
      - "${NGINX_PORT:-8085}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
